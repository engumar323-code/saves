<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Login - Cooperative Savings & Credit Society</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top left, #0f3d3a 0%, #0f172a 40%, #134e4a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, rgba(196, 154, 61, 0.22), transparent 45%, rgba(255,255,255,0.08));
            pointer-events: none;
        }

        .login-container {
            background: linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(252,248,235,0.98) 100%);
            border-radius: 24px;
            box-shadow: 0 28px 90px rgba(0, 0, 0, 0.28);
            width: 100%;
            max-width: 440px;
            padding: 42px 38px;
            animation: slideUp 0.5s ease;
            border: 1px solid rgba(196, 154, 61, 0.25);
            backdrop-filter: blur(10px);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            margin-bottom: 15px;
        }

        .logo img {
            width: 78px;
            height: 78px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(196, 154, 61, 0.24);
            border: 2px solid rgba(196, 154, 61, 0.35);
        }

        .login-header h1 {
            font-size: 26px;
            color: #0f172a;
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .login-header p {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #1f2937;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.25s ease;
            font-family: inherit;
            background: #fff;
        }

        input:focus {
            outline: none;
            border-color: #0f766e;
            box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
        }

        input::placeholder {
            color: #9ca3af;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
            margin: 0;
        }

        .forgot-password {
            color: #2563eb;
            text-decoration: none;
            cursor: pointer;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #0f766e 0%, #8a6426 55%, #c49a3d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 14px 28px rgba(196, 154, 61, 0.24);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 32px rgba(196, 154, 61, 0.28);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #d1d5db;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 10px;
            color: #9ca3af;
            font-size: 13px;
        }

        .demo-accounts {
            background: linear-gradient(135deg, #f8fbff 0%, #f3f8ff 100%);
            border: 1px solid #dbeafe;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
        }

        .demo-accounts h3 {
            color: #0369a1;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .demo-account {
            margin-bottom: 8px;
            color: #0369a1;
        }

        .demo-account strong {
            display: block;
            margin-bottom: 2px;
        }

        .signup-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #6b7280;
        }

        .signup-link a {
            color: #8a6426;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee2e2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: shake 0.5s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: #dcfce7;
            border: 1px solid #86efac;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            animation: slideDown 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            right: 12px;
            top: 40px;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 0;
            width: auto;
        }

        .password-toggle-btn:hover {
            color: #6b7280;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 20px;
            }

            .logo {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <img src="logo1.jpeg" alt="The Bridge Micro Saving Logo">
            </div>
            <h1>The Bridge Micro Saving</h1>
            <p>Savings & Credit Cooperative Management System</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="Enter your email"
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-toggle">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                    <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility()">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="remember-forgot" style="display: none;"></div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i>
                <span>Sign In</span>
            </button>
        </form>
    </div>

    <script>
        async function loginToBackend(email, password) {
            try {
                const response = await fetch('http://127.0.0.1:5000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();
                return { ok: response.ok, result };
            } catch (error) {
                return { ok: false, result: { message: 'Backend server is not available.' } };
            }
        }

        window.addEventListener('load', function() {
            const session = JSON.parse(localStorage.getItem('coopSession') || 'null');
            if (session && session.userId) {
                window.location.replace('index.html');
                return;
            }

            const rememberedEmail = localStorage.getItem('coopRememberedEmail');
            const rememberedPassword = localStorage.getItem('coopRememberedPassword');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            if (emailInput) {
                emailInput.value = '';
            }

            if (passwordInput) {
                passwordInput.value = '';
            }

            if (rememberedEmail && emailInput) {
                emailInput.dataset.rememberedEmail = rememberedEmail;
            }

            if (rememberedPassword && passwordInput) {
                passwordInput.dataset.rememberedPassword = rememberedPassword;
            }
        });

        function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            clearMessages();

            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            const loginBtn = document.getElementById('loginBtn');
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Signing In...</span>';

            loginToBackend(email, password).then(({ ok, result }) => {
                if (!ok || !result.ok) {
                    loginBtn.classList.remove('loading');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Sign In</span>';
                    showError(result.message || 'Invalid email or password');
                    return;
                }

                const user = result.user;
                const session = {
                    userId: user.id,
                    userName: user.name,
                    userEmail: user.email,
                    userRole: user.role,
                    loginTime: new Date().toISOString()
                };

                localStorage.setItem('coopSession', JSON.stringify(session));
                localStorage.setItem('coopRememberedEmail', email);
                localStorage.setItem('coopRememberedPassword', password);

                showSuccess(`Welcome back, ${user.name}!`);

                setTimeout(() => {
                    window.location.replace('index.html');
                }, 1000);
            });
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.password-toggle-btn');

            if (!passwordInput || !toggleBtn) {
                return;
            }

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.innerHTML = '<i class="fas fa-eye-slash"></i>';
            } else {
                passwordInput.type = 'password';
                toggleBtn.innerHTML = '<i class="fas fa-eye"></i>';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }

        function clearMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('loginForm').requestSubmit();
            }
        });
    </script>
</body>
</html>
